# ==============================================================================
# k8s/secrets/secrets.yaml
#
# IMPORTANT — What belongs here vs. Jenkins:
#
#   ❌ DB secrets (identity, order, inventory, catalog) are NOT here.
#      They are injected DYNAMICALLY by the Jenkins pipeline using live
#      Terraform outputs (RDS/DocumentDB endpoints) + Jenkins Credentials.
#      Storing them here would overwrite the real values with placeholders.
#
#   ✅ Non-DB secrets that don't change per-deploy live here and are safe
#      to commit (sensitive values should still use real values only in
#      production via a sealed-secrets / external-secrets solution).
# ==============================================================================

# ------------------------------------------------------------------------------
# Cart Service — Redis (in-cluster, password static)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: cart-redis-secret
  namespace: cloudmart
type: Opaque
stringData:
  REDIS_PASSWORD: cart_secret
---
# ------------------------------------------------------------------------------
# JWT Signing Key
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: cloudmart
type: Opaque
stringData:
  JWT_SECRET: super-secret-jwt-key-change-in-production
---
# ------------------------------------------------------------------------------
# RabbitMQ (in-cluster, credentials static)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: cloudmart
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: guest
  RABBITMQ_DEFAULT_PASS: guest
---
# ------------------------------------------------------------------------------
# Payment Service (Stripe / PayPal keys)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: payment-secret
  namespace: cloudmart
type: Opaque
stringData:
  STRIPE_SECRET_KEY: sk_test_placeholder
  PAYPAL_CLIENT_ID: paypal_placeholder
  PAYPAL_CLIENT_SECRET: paypal_secret_placeholder