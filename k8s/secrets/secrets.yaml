
# ------------------------------------------------------------------------------
# Cart Service — Redis (in-cluster, password static)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: cart-redis-secret
  namespace: cloudmart
type: Opaque
stringData:
  REDIS_PASSWORD: cart_secret
---
# ------------------------------------------------------------------------------
# JWT Signing Key
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: cloudmart
type: Opaque
stringData:
  JWT_SECRET: super-secret-jwt-key-change-in-production
---
# ------------------------------------------------------------------------------
# RabbitMQ (in-cluster, credentials static)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: cloudmart
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: guest
  RABBITMQ_DEFAULT_PASS: guest
---
# ------------------------------------------------------------------------------
# Payment Service (Stripe / PayPal keys)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: payment-secret
  namespace: cloudmart
type: Opaque
stringData:
  STRIPE_SECRET_KEY: sk_test_placeholder
  PAYPAL_CLIENT_ID: paypal_placeholder
  PAYPAL_CLIENT_SECRET: paypal_secret_placeholder

  

---
# ------------------------------------------------------------------------------
# Identity Service Database (Local Mock)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: identity-db-secret
  namespace: cloudmart
type: Opaque
stringData:
  DATABASE_URL: postgresql://identity_user:localpass@identity-db:5432/identity_db
  POSTGRES_USER: identity_user
  POSTGRES_PASSWORD: localpass
  POSTGRES_DB: identity_db
---
# ------------------------------------------------------------------------------
# Order Service Database (Local Mock)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: order-db-secret
  namespace: cloudmart
type: Opaque
stringData:
  DATABASE_URL: postgresql://order_user:localpass@order-db:5432/order_db
  POSTGRES_USER: order_user
  POSTGRES_PASSWORD: localpass
  POSTGRES_DB: order_db
---
# ------------------------------------------------------------------------------
# Inventory Service Database (Local Mock)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: inventory-db-secret
  namespace: cloudmart
type: Opaque
stringData:
  DATABASE_URL: postgresql://inventory_user:localpass@inventory-db:5432/inventory_db
  POSTGRES_USER: inventory_user
  POSTGRES_PASSWORD: localpass
  POSTGRES_DB: inventory_db
---
# ------------------------------------------------------------------------------
# Product Catalog Database (MongoDB Local Mock)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: catalog-db-secret
  namespace: cloudmart
type: Opaque
stringData:
  # MongoDB usually uses MONGO_INITDB_ROOT_USERNAME/PASSWORD for initialization
  MONGO_INITDB_ROOT_USERNAME: catalog_user
  MONGO_INITDB_ROOT_PASSWORD: localpass
  MONGODB_URI: mongodb://catalog_user:localpass@catalog-db:27017/catalog_db?authSource=admin