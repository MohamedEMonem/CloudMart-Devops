apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: cloudmart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z rabbitmq 5672; do
                echo "waiting for rabbitmq..."
                sleep 3
              done
              echo "rabbitmq is up"
      containers:
        - name: cart-service
          image: marwanmw/cloudmart-cart-service
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: REDIS_HOST
              value: "cart-redis"
            - name: REDIS_PORT
              value: "6379"
          envFrom:
            - secretRef:
                name: cart-redis-secret
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: cloudmart
spec:
  selector:
    app: cart-service
  ports:
    - port: 3000
      targetPort: 3000
