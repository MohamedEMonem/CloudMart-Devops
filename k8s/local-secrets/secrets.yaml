---
# ------------------------------------------------------------------------------
# Identity Service Database (Local Mock)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: identity-db-secret
  namespace: cloudmart
type: Opaque
stringData:
  DATABASE_URL: postgresql://identity_user:localpass@identity-db:5432/identity_db
  POSTGRES_USER: identity_user
  POSTGRES_PASSWORD: localpass
  POSTGRES_DB: identity_db
---
