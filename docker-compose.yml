services:
  backend:
    image: marwanmw/cloudmart-backend:latest
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
    expose:
      - "5000"

  frontend:
    image: marwanmw/cloudmart-frontend:latest
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
